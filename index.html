<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px;
            text-align: center;
        }

        img {
            border-radius: 20px;
            width: 300px;
            height: 300px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 3em;
            margin-top: 20px;
            color: #4a4a4a;
            font-weight: bold;
        }

        p {
            font-size: 1.2em;
            color: #666;
            max-width: 600px;
            margin: 20px auto;
            line-height: 1.6em;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 30px;
            font-size: 1em;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #2980b9;
        }

        footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="my_photo.jpg" alt="My Photo">
    <h1>Hello, I'm LUOPENG ZHOU(周罗鹏)</h1>
    <p>I'm a passionate individual who loves to create and explore new technologies. Welcome to my personal website
        where I share my projects, thoughts, and more.</p>
    <a href="#" class="button">Explore More</a>
</div>

<footer>
    &copy; 2024 Your Name. All rights reserved.
</footer>

</body>
</html>
